version: 2

models:
  - name: dim_date
    description: "Date dimension covering 3 years with Nigerian public holidays"
    columns:
      - name: date_key
        description: "YYYYMMDD integer primary key"
        tests:
          - not_null
          - unique
      - name: full_date
        description: "Full date value"
        tests:
          - not_null
      - name: is_weekend
        description: "True if Saturday or Sunday"
        tests:
          - not_null
      - name: is_public_holiday
        description: "True if Nigerian public holiday"
        tests:
          - not_null

  - name: dim_customer
    description: "SCD2 customer dimension with surrogate keys"
    columns:
      - name: customer_sk
        description: "Surrogate key — primary key for this dimension"
        tests:
          - not_null
          - unique
      - name: customer_id
        description: "Natural key from source system"
        tests:
          - not_null
      - name: is_current
        description: "True if this is the current active record"
        tests:
          - not_null
      - name: valid_from
        description: "Start date of this version"
        tests:
          - not_null

  - name: dim_product
    description: "SCD2 product dimension with surrogate keys"
    columns:
      - name: product_sk
        description: "Surrogate key — primary key for this dimension"
        tests:
          - not_null
          - unique
      - name: product_id
        description: "Natural key from source system"
        tests:
          - not_null
      - name: is_current
        description: "True if this is the current active record"
        tests:
          - not_null

  - name: fct_sales
    description: "Transactional fact — one row per order line item"
    columns:
      - name: sales_sk
        description: "Surrogate primary key"
        tests:
          - not_null
          - unique
      - name: date_key
        description: "Foreign key to dim_date"
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: customer_sk
        description: "Foreign key to dim_customer"
        tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_sk
      - name: product_sk
        description: "Foreign key to dim_product"
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_sk
      - name: store_sk
        description: "Foreign key to dim_store"
        tests:
          - not_null
          - relationships:
              to: ref('dim_store')
              field: store_sk
      - name: quantity
        description: "Must be greater than zero"
        tests:
          - not_null
      - name: gross_amount
        description: "Must be greater than zero"
        tests:
          - not_null

  - name: fct_inventory_daily
    description: "Periodic snapshot — one row per product per store per day"
    columns:
      - name: inventory_snapshot_sk
        description: "Surrogate primary key"
        tests:
          - not_null
          - unique
      - name: date_key
        description: "Foreign key to dim_date"
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: product_sk
        description: "Foreign key to dim_product"
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_sk
      - name: store_sk
        description: "Foreign key to dim_store"
        tests:
          - not_null
          - relationships:
              to: ref('dim_store')
              field: store_sk
      - name: closing_stock
        description: "Closing stock must not be negative"
        tests:
          - not_null

  - name: flagged_payments
    description: "Data quality artifact — anomalous payments isolated here"
    columns:
      - name: flagged_payment_sk
        description: "Surrogate primary key"
        tests:
          - not_null
          - unique
      - name: flag_reason
        description: "Reason payment was flagged"
        tests:
          - not_null
          - accepted_values:
              values: [
                'zero amount payment',
                'unexplained negative amount',
                'other anomaly'
              ]
      - name: amount_paid
        description: "Original payment amount"
        tests:
          - not_null