name: 'retailco'
version: '1.0.0'
config-version: 2
profile: 'retailco'

model-paths: ["models"]
snapshot-paths: ["snapshots"]
test-paths: ["tests"]
seed-paths: ["seeds"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  retailco:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts